<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}mulchd admin{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1e293b; }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 168px; background: #1e293b; padding: 14px 8px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-logo { color: white; font-weight: 700; font-size: 15px; padding: 2px 8px 12px; letter-spacing: -0.3px; }
  .nav-link { display: block; padding: 7px 10px; color: #94a3b8; text-decoration: none; border-radius: 4px; font-size: 13px; }
  .nav-link:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
  .nav-link.active { background: rgba(255,255,255,0.12); color: white; }
  .sidebar-spacer { flex: 1; }
  .sidebar-logout { width: 100%; text-align: left; background: none; border: none; cursor: pointer; display: block; padding: 7px 10px; color: #64748b; font-size: 13px; border-radius: 4px; font-family: inherit; }
  .sidebar-logout:hover { color: #94a3b8; }

  .main { flex: 1; background: #f8fafc; padding: 28px 32px; }
  .page-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }

  /* Cards */
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
  .card + .card { margin-top: 16px; }

  /* Tables */
  .table-header { padding: 8px 16px; border-bottom: 1px solid #f1f5f9; font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 600; letter-spacing: 0.06em; display: grid; gap: 8px; }
  .table-row { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; align-items: center; display: grid; gap: 8px; }
  .table-row:last-child { border-bottom: none; }

  /* Forms */
  .form-section { padding: 14px 16px; border-top: 1px solid #f1f5f9; }
  .form-section-title { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 10px; }
  .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 3px; }
  .form-group label { font-size: 11px; color: #64748b; font-weight: 500; }
  .form-group input, .form-group select { border: 1px solid #d1d5db; border-radius: 4px; padding: 6px 10px; font-size: 13px; background: white; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }

  /* Buttons */
  .btn { padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; text-decoration: none; display: inline-block; line-height: 1.4; }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: white; border: 1px solid #e2e8f0; color: #374151; }
  .btn-secondary:hover { background: #f8fafc; }
  .btn-link-danger { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; padding: 2px 0; font-family: inherit; }
  .btn-link-danger:hover { color: #dc2626; text-decoration: underline; }
  .btn-link { background: none; border: none; color: #3b82f6; font-size: 12px; cursor: pointer; padding: 2px 0; font-family: inherit; text-decoration: none; }
  .btn-link:hover { color: #2563eb; text-decoration: underline; }

  /* Badges */
  .badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-active { background: #d1fae5; color: #065f46; }
  .badge-inactive { background: #fee2e2; color: #991b1b; }
  .badge-admin { background: #dbeafe; color: #1d4ed8; }
  .badge-writer { background: #d1fae5; color: #065f46; }
  .badge-reader { background: #f1f5f9; color: #475569; }

  /* Alerts */
  .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
  .alert-warning { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }
  .alert-error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }

  /* Token */
  .token-box { background: #0f172a; color: #22d3ee; font-family: 'Courier New', monospace; padding: 14px 16px; border-radius: 6px; font-size: 14px; word-break: break-all; letter-spacing: 0.04em; }
  .code-box { background: #f1f5f9; font-family: 'Courier New', monospace; padding: 12px 14px; border-radius: 6px; font-size: 12px; color: #334155; white-space: pre; overflow-x: auto; line-height: 1.6; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 18px 20px; }
  .stat-number { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
  .stat-link { text-decoration: none; color: inherit; display: block; }
  .stat-link:hover .stat-number { color: #3b82f6; }

  /* Login */
  .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; }
  .login-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 32px; width: 320px; }
  .login-logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; }
  .login-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .login-field label { font-size: 12px; font-weight: 500; color: #374151; }
  .login-field input { border: 1px solid #d1d5db; border-radius: 4px; padding: 8px 12px; font-size: 14px; outline: none; }
  .login-field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }

  /* Misc */
  .empty-state { padding: 24px 16px; text-align: center; color: #94a3b8; font-size: 13px; }
  .text-muted { color: #94a3b8; font-size: 12px; }
  .monospace { font-family: 'Courier New', monospace; font-size: 12px; }
</style>
</head>
<body>
{% block body %}
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">mulchd</div>
    <a href="/admin/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/admin/users" class="nav-link {% if active == 'users' %}active{% endif %}">Users</a>
    <a href="/admin/orgs" class="nav-link {% if active == 'orgs' %}active{% endif %}">Orgs</a>
    <a href="/admin/projects" class="nav-link {% if active == 'projects' %}active{% endif %}">Projects</a>
    <a href="/admin/memberships" class="nav-link {% if active == 'memberships' %}active{% endif %}">Memberships</a>
    <a href="/admin/project-tokens" class="nav-link {% if active == 'project-tokens' %}active{% endif %}">Tokens</a>
    <a href="/admin/records" class="nav-link {% if active == 'records' %}active{% endif %}">Records</a>
    <a href="/admin/audit" class="nav-link {% if active == 'audit' %}active{% endif %}">Audit</a>
    <div class="sidebar-spacer"></div>
    <form method="post" action="/admin/logout">
      <button type="submit" class="sidebar-logout">Logout</button>
    </form>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
</body>
</html>
