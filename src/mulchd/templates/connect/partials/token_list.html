{% if tokens %}
<div class="card">
  {% for t in tokens %}
  <div class="table-row" style="grid-template-columns:1fr auto auto;">
    <div>
      <span style="font-size:13px;font-weight:500;">{{ t.label or "unlabelled" }}</span>
      <div class="text-muted">Created {{ t.created_at.strftime("%Y-%m-%d") }}</div>
    </div>
    <button class="btn-link-danger"
            hx-post="/connect/projects/{{ org.slug }}/{{ project.slug }}/revoke/{{ t.id }}"
            hx-target="#token-list" hx-swap="innerHTML"
            hx-confirm="Revoke this token? Any client using it will lose access.">Revoke</button>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="empty-state">No active tokens — mint one below.</div>
{% endif %}
