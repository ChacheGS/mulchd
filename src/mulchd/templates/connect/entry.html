{% extends "connect/connect_base.html" %}
{% block page_title %}sign in{% endblock %}
{% block content %}
<div style="max-width:360px; margin:40px auto;">
  <div class="card" style="padding:32px;">
    <div class="login-logo" style="margin-bottom:4px">mulchd</div>
    <div class="login-subtitle" style="margin-bottom:24px">Connect your MCP client</div>
    <div id="form-area">
      {% if error %}<div class="alert alert-error" style="margin-bottom:16px">{{ error }}</div>{% endif %}
      <form hx-post="/connect" hx-target="#form-area" hx-swap="outerHTML">
        <div class="login-field">
          <label for="token">Global token</label>
          <input type="password" id="token" name="token" placeholder="Paste your global token" autofocus required>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
          <input type="checkbox" id="remember_me" name="remember_me" value="on">
          <label for="remember_me" style="font-size:12px;color:#374151;">Remember me for 30 days</label>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
