# Local development override — use alongside the base compose file:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.local.yml up mulchd postgres
#
# Exposes mulchd on localhost:8000 directly. Traefik is omitted by only
# starting the services named on the command line.
services:
  postgres:
    ports:
      - "127.0.0.1:5433:5432"
  mulchd:
    ports:
      - "8000:8000"
