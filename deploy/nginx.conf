server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mulchd.your-domain.com;  # replace with your VPS domain

    ssl_certificate     /etc/letsencrypt/live/mulchd.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mulchd.your-domain.com/privkey.pem;

    # SSE requires long-lived connections — disable proxy buffering and set
    # generous timeouts so the stream stays open during idle periods.
    location /sse {
        proxy_pass         http://mulchd:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   Authorization $http_authorization;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /messages/ {
        proxy_pass       http://mulchd:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://mulchd:8000;
    }
}
