services:
  mulchd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      MULCHD_DATA_PATH: /data/mulch
      MULCHD_DB_URL: sqlite:////data/mulchd.db
      MULCHD_HOST: 0.0.0.0
      MULCHD_PORT: 8000
    volumes:
      - mulch_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - mulchd

volumes:
  mulch_data:
