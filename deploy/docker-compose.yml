services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    env_file:
      - traefik.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - ./traefik.yml:/etc/traefik/traefik.yml:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$ → literal $ after compose parsing; expanded by the shell inside the container
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 5s
      timeout: 3s
      retries: 10

  mulchd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - mulchd.env
    volumes:
      - mulch_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.mulchd.rule=Host(`mulchd.magolabs.cloud`)
      - traefik.http.routers.mulchd.entrypoints=websecure
      - traefik.http.routers.mulchd.tls=true
      - traefik.http.routers.mulchd.tls.certresolver=letsencrypt
      - traefik.http.services.mulchd.loadbalancer.server.port=8000
      - traefik.http.middlewares.sse-timeout.headers.customrequestheaders.X-Accel-Buffering=no
      - traefik.http.routers.mulchd.middlewares=sse-timeout

volumes:
  postgres_data:
  mulch_data:
  letsencrypt:
